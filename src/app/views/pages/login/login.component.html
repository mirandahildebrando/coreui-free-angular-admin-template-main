<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card p-4 shadow border-0">

        <h2 class="mb-4 text-center">
          Login
        </h2>

        <div
          *ngIf="mensagem"
          class="alert"
          [ngClass]="erro ? 'alert-danger' : 'alert-success'">

          {{ mensagem }}

        </div>

        <div class="mb-3">

          <label class="form-label">
            Email
          </label>

          <input
            type="email"
            class="form-control"
            [(ngModel)]="email">

        </div>

        <div class="mb-3">

          <label class="form-label">
            Senha
          </label>

          <input
            type="password"
            class="form-control"
            [(ngModel)]="password">

        </div>

        <button
          class="btn btn-primary w-100"
          [disabled]="loading"
          (click)="login()">

          {{ loading ? 'Entrando...' : 'Entrar' }}

        </button>

        <hr>

      </div>

    </div>

  </div>

</div>
