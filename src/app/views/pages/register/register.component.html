<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card p-4 shadow">

        <h2 class="mb-4 text-center">
          Cadastro
        </h2>

        <div class="mb-3">

          <label>Nome</label>

          <input
            type="text"
            class="form-control"
            [(ngModel)]="name">

        </div>

        <div class="mb-3">

          <label>Email</label>

          <input
            type="email"
            class="form-control"
            [(ngModel)]="email">

        </div>

        <div class="mb-3">

          <label>Senha</label>

          <input
            type="password"
            class="form-control"
            [(ngModel)]="password">

        </div>

        <button
          class="btn btn-success w-100"
          (click)="register()">

          Cadastrar

        </button>

        <hr>

        <button
          class="btn btn-outline-primary w-100"
          routerLink="/login">

          Voltar para login

        </button>

      </div>

    </div>

  </div>

</div>
